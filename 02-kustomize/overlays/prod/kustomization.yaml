# Overlay PROD — customizacja dla środowiska produkcyjnego
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: myapp-prod

commonLabels:
  environment: prod

patches:
  - path: patches/deployment-patch.yaml
    target:
      kind: Deployment
      name: myapp
  - path: patches/configmap-patch.yaml
    target:
      kind: ConfigMap
      name: myapp-html
